name: CD | Deploy server

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Public server name'
        required: true
        type: string
      host:
        description: Public domain or IP where xray should be deployed (if ssh and xray are on the same IP, it should be equal to config_servers[hosts_server_uuid].host value)
        required: true
        type: string
      port:
        description: 'Port where xray should be deployed (should match the value in config/ports.yml)'
        required: true
        type: string
        default: '443'
      fingerprint:
        description: reality fingerprint for the server (output of `ssh-keyscan -t rsa <server_ip>` command)
        required: true
        type: choice
        options:
          - chrome
          - safari
          - ios
      fallback_proxy_target:
        description: 'Fallback proxy target for xray'
        required: true
        type: string
      sni:
        description: 'SNI value for xray'
        required: true
        type: string
      number_of_users:
        description: 'Number of users to generate configs for (should match the value in config/ports.yml)'
        required: true
        type: string
        default: '1024'

jobs:
  deploy-server:
    name: Deploy on production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run playbook
        shell: bash
        env:
          NAME: ${{ inputs.name }}
          HOST: ${{ inputs.host }}
          PORT: ${{ inputs.port }}
          FINGERPRINT: ${{ inputs.fingerprint }}
          FALLBACK_PROXY_TARGET: ${{ inputs.fallback_proxy_target }}
          SNI: ${{ inputs.sni }}
          NUMBER_OF_USERS: ${{ inputs.number_of_users }}
        run: |
          ansible-playbook proxies.yml --extra-vars "$(jq -n \
            --arg name "$NAME" \
            --arg host "$HOST" \
            --arg port "$PORT" \
            --arg fingerprint "$FINGERPRINT" \
            --arg fallback_proxy_target "$FALLBACK_PROXY_TARGET" \
            --arg sni "$SNI" \
            --arg number_of_users "$NUMBER_OF_USERS" \
            '{name: $name, host: $host, port: $port, fingerprint: $fingerprint, fallback_proxy_target: $fallback_proxy_target, sni: $sni, number_of_users: $number_of_users}')"

      - name: Upload URIs artifact
        uses: actions/upload-artifact@v4
        with:
          name: uris-${{ inputs.name }}
          path: uris.txt

      - name: Sync VPN provider and URIs to Supabase
        shell: bash
        env:
          NAME: ${{ inputs.name }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          AUTH_HEADERS=(
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY"
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"
          )

          ENCODED_NAME=$(jq -rn --arg v "$NAME" '$v | @uri')

          # Delete existing provider with this name (non-fatal: ok if none exists)
          curl -sf -X DELETE \
            "$SUPABASE_URL/rest/v1/vpn_providers?name=eq.$ENCODED_NAME" \
            "${AUTH_HEADERS[@]}" || true

          # Create new provider and capture its id
          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/rest/v1/vpn_providers" \
            "${AUTH_HEADERS[@]}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            --data "$(jq -n --arg name "$NAME" '{"name": $name}')")
          CREATE_BODY=$(echo "$CREATE_RESPONSE" | head -n -1)
          CREATE_STATUS=$(echo "$CREATE_RESPONSE" | tail -n 1)
          echo "Create status: $CREATE_STATUS"
          echo "Create response: $CREATE_BODY"
          if [[ "$CREATE_STATUS" -lt 200 || "$CREATE_STATUS" -ge 300 ]]; then
            echo "ERROR: Failed to create vpn_provider (HTTP $CREATE_STATUS)"
            exit 1
          fi

          PROVIDER_ID=$(echo "$CREATE_BODY" | jq -r '.[0].id')
          echo "Created provider id: $PROVIDER_ID"

          # Bulk insert all URIs
          jq -Rn --arg id "$PROVIDER_ID" '[inputs | {"uri": ., "vpn_provider_id": $id}]' < uris.txt > /tmp/vpns_payload.json
          curl -sf -X POST \
            "$SUPABASE_URL/rest/v1/vpns" \
            "${AUTH_HEADERS[@]}" \
            -H "Content-Type: application/json" \
            --data @/tmp/vpns_payload.json

      - name: Invoke shuffle_vpn edge function
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sf -X POST \
            "$SUPABASE_URL/functions/v1/shuffle_vpns" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"
