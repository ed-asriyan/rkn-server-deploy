name: CD | Deploy server

on:
  workflow_call:
    inputs:
      servers:
        description: >-
          JSON object of server configurations. Each key is a server name; each value has:
          host, port, fingerprint, fallback_proxy_target, snis (comma-separated), number_of_users.
          Example: {"a":{"host":"1.2.3.4","port":443,"fingerprint":"chrome","fallback_proxy_target":"example.com:443","snis":"example.com","number_of_users":256}}
        required: true
        type: string
      pairs:
        description: >-
          JSON object of relay pairs. A key proxies to its value (e.g. {"a":"b"} means a forwards to b).
          Servers not listed as keys connect directly to freedom. Omit or pass {} for all-direct servers.
        required: false
        type: string
        default: '{}'
      seed:
        description: >-
          Integer seed for deterministic UUID and keypair generation. When set, re-running the workflow
          with the same seed and server hosts produces identical client configs. Omit for random generation.
        required: false
        type: string
    secrets:
      SSH_PRIVATE_KEY:
        description: 'SSH private key for accessing the server under root user (should match the public key added to the server /root/.ssh/authorized_keys)'

jobs:
  deploy-server:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ed-asriyan/rkn-server-deploy

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run playbook
        shell: bash
        env:
          SERVERS_JSON: ${{ inputs.servers }}
          PAIRS_JSON: ${{ inputs.pairs }}
          SEED: ${{ inputs.seed }}
        run: |
              EXTRA='{"servers": '"$SERVERS_JSON"', "pairs": '"$PAIRS_JSON"'}'
              if [ -n "$SEED" ]; then
                EXTRA="${EXTRA%\}}, \"seed\": $SEED}"
              fi
              printf '%s' "$EXTRA" > /tmp/vars.json
              ansible-playbook proxies.yml --extra-vars "@/tmp/vars.json"

      - name: Upload configs as artifact
        uses: actions/upload-artifact@v7
        with:
          name: uris.txt
          path: uris.txt
