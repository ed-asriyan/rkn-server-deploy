# Default variables for xray role
xray_server:
  # public name for the server
  host:
  # port on which xray will listen on the server (should match the value in config/ports.yml)
  port:
  # reality fingerprint for the server (output of `ssh-keyscan -t rsa <server_ip>` command)
  fingerprint:
  # fallback proxy target for xray
  fallback_proxy_target:
  # array of SNI values for xray
  snis:
  # private x25519 key for xray
  private_key:
  # public x25519 key for xray
  public_key:
  # list of uuids for xray users
  uuids:

# next-hop relay: if set, traffic is forwarded to another VLESS server instead of going direct
# (for use when this server is in a censored country and the next hop is in a free country)
xray_next_server:
  # next-hop relay IP
  host:
  # port on which the next-hop VLESS server listens
  port:
  # user uuids for the next-hop VLESS server
  uuids:
  # SNI values for the next-hop VLESS server
  snis:
  # reality fingerprint of the next-hop VLESS server
  fingerprint:
  # public x25519 key of the next-hop VLESS server
  public_key:
  # reality fingerprint for the next-hop VLESS server (output of `ssh-keyscan -t rsa <next_hop_host_ip>` command)
  fingerprint:
