- name: Ensure required variables are defined
  assert:
    that:
      - xray_server.host is string
      - xray_server.port is number
      - xray_server.fingerprint is string
      - xray_server.fallback_proxy_target is string
      - xray_server.snis is iterable
      - xray_server.private_key is string
      - xray_server.public_key is string
      - xray_server.uuids is iterable

- name: Ensure xray_server.uuids is a list
  loop: "{{ xray_server.uuids }}"
  assert:
    that:
      - item is string
      - item | length > 0

- name: Ensure xray_next_server values are defined
  when: xray_next_server is not none
  assert:
    that:
      - xray_next_server.host is string
      - xray_next_server.host | length > 0
      - xray_next_server.port is number
      - xray_next_server.uuids is iterable
      - xray_next_server.uuids | length > 0
      - xray_next_server.fingerprint is string
      - xray_next_server.fingerprint | length > 0
      - xray_next_server.public_key is string
      - xray_next_server.public_key | length > 0

- name: Install the prerequisites
  with_items:
    - unzip
  package:
    name: "{{ item }}"
    state: present

- name: Create user
  user: name={{ xray_user }}

- name: Detect arch
  command: uname -m
  check_mode: no
  register: arch

- name: Know if the directory exists
  stat:
    path: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}"
  register: file_stat

- name: Create directory for xray files
  file:
    path: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}"
    group: "{{ xray_user }}"
    owner: "{{ xray_user }}"
    mode: "700"
    state: directory

- name: Download & extract xray
  when: "file_stat.stat.exists == false"
  unarchive:
    src: "{{ xray_downloads[arch.stdout].url }}"
    dest: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}"
    remote_src: yes
  register: download

# https://superuser.com/a/892391
- name: Set CAP_NET_BIND_SERVICE capability for xray
  when: download.changed
  command: setcap 'cap_net_bind_service=+ep' "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}/{{ xray_executable_name }}"

- name: Set xray ownership, group and permissions
  file:
    path: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}/{{ xray_executable_name }}"
    group: "{{ xray_user }}"
    owner: "{{ xray_user }}"
    mode: "700"

- name: Set executable ownership, group and permissions
  file:
    path: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}/{{ xray_executable_name }}"
    group: "{{ xray_user }}"
    owner: "{{ xray_user }}"
    mode: "700"

- name: Render xray config
  template:
    src: config.json.j2
    dest: "/home/{{ xray_user }}/{{ xray_config_file_name }}"
    group: "{{ xray_user }}"
    owner: "{{ xray_user }}"
    mode: "600"
  register: config

- name: Remove unexpected files in home
  include_tasks: tasks/remove-unexpected-files.yml
  vars:
    directory: "/home/{{ xray_user }}"
    files:
      - "{{ xray_config_file_name }}"
      - "{{ xray_downloads[arch.stdout].directory }}"
      - "{{ xray_error_log_file_name }}"

- name: Render systemd service config
  template:
    src: xray.service.j2
    dest: /etc/systemd/system/xray.service
  register: systemd

- name: Reload daemon
  systemd:
    daemon_reload: yes
  when: systemd.changed

- name: Restart systemd app service
  systemd:
    name: xray.service
    state: restarted
    enabled: yes
  when: systemd.changed or download.changed or config.changed
