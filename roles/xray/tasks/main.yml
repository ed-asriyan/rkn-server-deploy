- name: Ensure required variables are defined
  assert:
    that:
      - xray_host is string
      - xray_port is number
      - xray_fingerprint is string
      - xray_fallback_proxy_target is string
      - xray_sni is string
      - xray_number_of_users is number

- name: Install the prerequisites
  with_items:
    - unzip
  package:
    name: "{{ item }}"
    state: present

- name: Create user
  user: name={{ xray_user }}

- name: Detect arch
  command: uname -m
  check_mode: no
  register: arch

- name: Know if the directory exists
  stat:
    path: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}"
  register: file_stat

- name: Create directory for xray files
  file:
    path: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}"
    group: "{{ xray_user }}"
    owner: "{{ xray_user }}"
    mode: "700"
    state: directory

- name: Download & extract xray
  when: "file_stat.stat.exists == false"
  unarchive:
    src: "{{ xray_downloads[arch.stdout].url }}"
    dest: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}"
    remote_src: yes
  register: download

# https://superuser.com/a/892391
- name: Set CAP_NET_BIND_SERVICE capability for xray
  when: download.changed
  command: setcap 'cap_net_bind_service=+ep' "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}/{{ xray_executable_name }}"

- name: Set xray ownership, group and permissions
  file:
    path: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}/{{ xray_executable_name }}"
    group: "{{ xray_user }}"
    owner: "{{ xray_user }}"
    mode: "700"

- name: Set executable ownership, group and permissions
  file:
    path: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}/{{ xray_executable_name }}"
    group: "{{ xray_user }}"
    owner: "{{ xray_user }}"
    mode: "700"

- include_tasks: tasks/generate-uuids.yml
  vars:
    count: "{{ xray_number_of_users }}"
    uuids_var: xray_uuids

- name: Generate x25519 keypair
  command: "/home/{{ xray_user }}/{{ xray_downloads[arch.stdout].directory }}/{{ xray_executable_name }} x25519"
  register: x25519_output
  changed_when: false

- name: Set xray key facts
  set_fact:
    xray_private_key: "{{ x25519_output.stdout | regex_search('Private key: (.+)', '\\1') | first }}"
    xray_public_key: "{{ x25519_output.stdout | regex_search('Public key: (.+)', '\\1') | first }}"

- name: Render xray config
  template:
    src: config.json.j2
    dest: "/home/{{ xray_user }}/{{ xray_config_file_name }}"
    group: "{{ xray_user }}"
    owner: "{{ xray_user }}"
    mode: "600"
  register: config

- name: Render xray configs locally
  delegate_to: localhost
  template:
    src: configs.txt.j2
    dest: "uris.txt"

- name: Remove unexpected files in home
  include_tasks: tasks/remove-unexpected-files.yml
  vars:
    directory: "/home/{{ xray_user }}"
    files:
      - "{{ xray_config_file_name }}"
      - "{{ xray_downloads[arch.stdout].directory }}"
      - "{{ xray_error_log_file_name }}"

- name: Render systemd service config
  template:
    src: xray.service.j2
    dest: /etc/systemd/system/xray.service
  register: systemd

- name: Reload daemon
  systemd:
    daemon_reload: yes
  when: systemd.changed

- name: Restart systemd app service
  systemd:
    name: xray.service
    state: restarted
    enabled: yes
  when: systemd.changed or download.changed or config.changed
