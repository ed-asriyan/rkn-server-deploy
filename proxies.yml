- hosts: localhost
  gather_facts: false
  tasks:
    - name: Register server hosts
      loop: "{{ servers | dict2items }}"
      add_host:
        name: "{{ item.key }}"
        groups: xray_servers
        ansible_host: "{{ item.value.host }}"
        ansible_user: root
        ansible_ssh_private_key_file: id_rsa
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
        xray_server_key: "{{ item.key }}"
        xray_server_config: "{{ item.value }}"

    - name: Generate x25519 keypair for each server
      loop: "{{ servers | dict2items }}"
      include_tasks: tasks/generate-x25519.yml
      vars:
        private_key_var: "xray_private_key_{{ item.key }}"
        public_key_var: "xray_public_key_{{ item.key }}"
        seed: "{{ seed | default(omit) }}"
        seed_host: "{{ item.value.host }}"

    - name: Generate UUIDs for each server
      loop: "{{ servers | dict2items }}"
      include_tasks: tasks/generate-uuids.yml
      vars:
        count: "{{ item.value.number_of_users | int }}"
        uuids_var: "xray_uuids_{{ item.key }}"
        seed: "{{ seed | default(omit) }}"
        seed_host: "{{ item.value.host }}"

- hosts: xray_servers
  gather_facts: true
  roles:
    - name: vnstat

    - role: xray
      vars:
        xray_server:
          host: "{{ xray_server_config.host }}"
          port: "{{ xray_server_config.port | int }}"
          fingerprint: "{{ xray_server_config.fingerprint }}"
          fallback_proxy_target: "{{ xray_server_config.fallback_proxy_target }}"
          snis: "{{ xray_server_config.snis.split(',') }}"
          uuids: "{{ hostvars['localhost']['xray_uuids_' + xray_server_key] }}"
          private_key: "{{ hostvars['localhost']['xray_private_key_' + xray_server_key] }}"
          public_key: "{{ hostvars['localhost']['xray_public_key_' + xray_server_key] }}"
        xray_next_server: >-
          {{
            {
              'host': servers[pairs[xray_server_key]].host,
              'port': servers[pairs[xray_server_key]].port | int,
              'fingerprint': servers[pairs[xray_server_key]].fingerprint,
              'snis': servers[pairs[xray_server_key]].snis.split(','),
              'uuids': [hostvars['localhost']['xray_uuids_' + pairs[xray_server_key]][0]],
              'public_key': hostvars['localhost']['xray_public_key_' + pairs[xray_server_key]],
            } if xray_server_key in (pairs | default({})) else none
          }}

- hosts: localhost
  gather_facts: false
  tasks:
    - name: Render URIs for each server
      loop: "{{ servers | dict2items }}"
      include_role:
        name: urls-render
      vars:
        xray_name: "{{ item.key }}"
        xray_host: "{{ item.value.host }}"
        xray_port: "{{ item.value.port | int }}"
        xray_fingerprint: "{{ item.value.fingerprint }}"
        xray_fallback_proxy_target: "{{ item.value.fallback_proxy_target }}"
        xray_snis: "{{ item.value.snis.split(',') }}"
        xray_uuids: "{{ hostvars['localhost']['xray_uuids_' + item.key] }}"
        xray_public_key: "{{ hostvars['localhost']['xray_public_key_' + item.key] }}"
        uris_dest: "uris_{{ item.key }}.txt"

    - name: Assemble URIs into uris.txt
      shell: "cat uris_*.txt > uris.txt && rm uris_*.txt"
