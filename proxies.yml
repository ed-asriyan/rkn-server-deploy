- hosts: localhost
  gather_facts: false
  tasks:
    - name: Register target host
      add_host:
        name: target
        ansible_host: "{{ host }}"
        ansible_user: root
        ansible_ssh_private_key_file: id_rsa
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

- hosts: target
  gather_facts: true
  roles:
    - name: vnstat

    - role: xray
      vars:
        xray_name: "{{ name }}"
        xray_host: "{{ host }}"
        xray_port: "{{ port | int }}"
        xray_fingerprint: "{{ fingerprint }}"
        xray_fallback_proxy_target: "{{ fallback_proxy_target }}"
        xray_sni: "{{ sni }}"
        xray_number_of_users: "{{ number_of_users | int }}"
